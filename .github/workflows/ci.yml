name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ruby:
    name: Ruby ${{ matrix.ruby }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        ruby: ["3.2", "3.3", "3.4", "4.0"]
    steps:
      # berylx の Gemfile は移行期に darkcore を sibling path 依存で参照する
      # (gem 'darkcore', path: '../darkcore-ruby')。CI では隣接ディレクトリへ
      # 両リポジトリを checkout してから bundle しないと解決できず exit 13 で落ちる。
      - name: Checkout berylx
        uses: actions/checkout@v4
        with:
          path: berylx

      - name: Checkout darkcore-ruby (sibling path dependency)
        uses: actions/checkout@v4
        with:
          repository: minamorl/darkcore-ruby
          path: darkcore-ruby

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
          working-directory: berylx

      # native bridge を先にコンパイルし、native / pure Ruby の両経路で
      # 同じテスト (等価性差分テスト含む) を回す。fallback 側は
      # BERYLX_NATIVE=0 で gate を殺すが、等価性テストは Native.run_entry を
      # 直接叩くので C interpreter も引き続き検証される。
      - name: Compile native bridge
        working-directory: berylx
        run: bundle exec rake compile

      - name: Run tests (native bridge)
        working-directory: berylx
        run: bundle exec rake test

      - name: Run tests (pure Ruby fallback)
        working-directory: berylx
        run: bundle exec rake test
        env:
          BERYLX_NATIVE: "0"

      - name: Run RuboCop
        working-directory: berylx
        run: bundle exec rubocop

      # examples は外部 gem (roda/sequel, moissanite) を要求するので実行は
      # せず、構文だけ全件検査して腐らせない。
      - name: Syntax-check examples
        working-directory: berylx
        run: for f in examples/*.rb; do ruby -c "$f"; done

      - name: Build gem
        working-directory: berylx
        run: gem build berylx.gemspec

  prettier:
    name: Prettier
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Node dependencies
        run: npm install

      - name: Check formatting
        run: npm run format:check
